<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistir · Beter XVideos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>

    <div id="siteHeader"></div>

    <main id="conteudo" class="page-shell single-column-shell">
      <section class="page-panel-stack">
        <div class="panel panel-heading-strip">
          <div class="panel-heading panel-heading-split">
            <div>
              <h2 id="viewPageTitle">Carregando vídeo...</h2>
            </div>
            <button id="favoriteButton" class="ghost" type="button" disabled>Salvar favorito</button>
          </div>
          <p id="statusMessage" class="status-message" aria-live="off"></p>
        </div>

        <div id="viewContent"></div>
      </section>
    </main>

    <script defer src="/vendor/hls/hls.min.js"></script>
    <script type="module" src="/view.js"></script>
  </body>
</html>
